<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬物皆可敲 - 終極四關舒壓版</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,159,67,0.5);
            font-size: 24px;
        }

        /* 工具選擇區 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            background: #2d2d2d;
            padding: 8px 18px;
            border-radius: 30px;
            border: 2px solid #444;
        }

        .tool-btn {
            background: #3a3a3a;
            color: #fff;
            border: 2px solid #555;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tool-btn:hover { background: #4a4a4a; transform: scale(1.05); }
        .tool-btn.active {
            background: #ff9f43;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 10px #ff9f43;
        }

        /* 血條樣式 */
        .hp-container {
            width: 320px;
            background-color: #444;
            border: 3px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hp-bar {
            width: 100%;
            height: 22px;
            background-color: #ff4757;
            transition: width 0.08s ease;
        }

        #hpText {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* 遊戲主舞台 */
        .stage {
            position: relative;
            width: 500px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 關卡切換控制 */
        .level {
            display: none;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .level.active { display: flex; }

        /* 通用豆腐渣化外觀 */
        .tofu-crumbled {
            background-color: #e4d5b7 !important;
            border-color: #b5a484 !important;
            box-shadow: inset 0 0 20px rgba(181,164,132,0.6) !important;
        }

        /* ================= 關卡 1：電視 ================= */
        .tv {
            width: 260px; height: 200px;
            background-color: #5c4033; border: 8px solid #3e2723; border-radius: 15px;
            display: flex; align-items: center; padding-left: 15px; transition: 0.2s;
        }
        .tv-screen {
            width: 170px; height: 150px; background-color: #7bedf2;
            border-radius: 20px; border: 4px solid #222; position: relative; overflow: hidden;
        }
        .screen-content {
            width: 100%; height: 100%; animation: flicker 0.15s infinite;
            background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,0.2) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,0,255,0.05));
            background-size: 100% 4px, 6px 100%;
        }
        .crack { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; pointer-events:none;}

        /* ================= 關卡 2：電腦 ================= */
        .pc-setup { display: flex; align-items: flex-end; gap: 15px; }
        .pc-monitor {
            width: 220px; height: 150px; background-color: #444; border: 8px solid #333;
            border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .pc-monitor::after { content:''; position:absolute; bottom:-25px; left:95px; width:30px; height:25px; background:#222; }
        .pc-screen { width: 100%; height: 100%; background: #0022cc; color: white; font-family: monospace; font-size: 11px; padding: 10px; box-sizing: border-box; text-align: center; }
        .pc-main { width: 80px; height: 180px; background: #eee; border: 4px solid #ccc; border-radius: 4px; }

        /* ================= 關卡 3：夾娃娃機 ================= */
        .claw-machine {
            width: 180px; height: 260px; background-color: #ff6b6b; border: 6px solid #ee5253;
            border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        .claw-glass {
            width: 100%; height: 160px; background: rgba(120, 224, 143, 0.3); border-bottom: 6px solid #ee5253;
            display: flex; align-items: flex-end; justify-content: center; position: relative;
        }
        .doll { width: 50px; height: 50px; background: #ffeaa7; border-radius: 50%; border: 3px solid #dbd3b6; text-align: center; line-height: 44px; font-size: 20px; font-weight: bold;}
        .claw-bottom { width: 100%; height: 100px; background: #ff7675; position: relative; }
        .coin-slot { width: 20px; height: 30px; background: #222; position: absolute; top: 20px; left: 30px; border-radius: 3px; }

        /* ================= 關卡 4：摩天大樓 ================= */
        .building {
            width: 140px; height: 270px; background-color: #74b9ff; border: 5px solid #0984e3;
            border-radius: 5px; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; box-sizing: border-box;
        }
        .floor-row { display: flex; justify-content: space-around; }
        .window { width: 25px; height: 25px; background-color: #fff2cc; border-radius: 3px; }

        /* 下一關按鈕 */
        .next-btn {
            display: none; background: #10ac84; color: white; border: none;
            padding: 10px 25px; font-size: 16px; font-weight: bold; border-radius: 20px;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(16,172,132,0.3);
        }
        .next-btn:hover { background: #0f9b75; }

        /* ================= 特效動畫 ================= */
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-8px, 4px) rotate(-2deg); }
            75% { transform: translate(6px, -4px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes whip-shake {
            0% { transform: translate(0, 0); }
            30% { transform: translate(18px, -6px) rotate(4deg); }
            70% { transform: translate(-12px, 4px) rotate(-4deg); }
            100% { transform: translate(0, 0); }
        }
        .shake { animation: shake 0.12s ease-in-out; }
        .whip-animation { animation: whip-shake 0.1s ease-in-out; }
        @keyframes flicker { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; } }

        /* 傷害文字與粒子 */
        .damage-pop {
            position: absolute; font-size: 26px; font-weight: bold; pointer-events: none;
            animation: floatUp 0.35s ease-out forwards; text-shadow: 2px 2px 0px #000; z-index: 10;
        }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 100% { transform: translateY(-50px) scale(1); opacity: 0; } }

        .tofu-particle {
            position: absolute; width: 10px; height: 10px; background-color: #eae1cc;
            border: 1px solid #c4b59a; pointer-events: none; z-index: 5;
            animation: dropParticle 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes dropParticle {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(270deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="gameTitle">📺 第 1 關：爆揍豆腐渣大頭電視 📺</h1>
    
    <div class="toolbar">
        <button class="tool-btn active" id="btn-hand" onclick="selectTool('hand', 8, '#00ffcc', 'normal')">👊 愛之鐵拳</button>
        <button class="tool-btn" id="btn-whip" onclick="selectTool('whip', 30, '#55efc4', 'whip')">🌿 阿母的鞭條</button>
        <button class="tool-btn" id="btn-sledge" onclick="selectTool('sledge', 80, '#ff4757', 'normal')">⚡ 終極大榔頭</button>
    </div>

    <div class="hp-container">
        <div class="hp-bar" id="hpBar"></div>
    </div>
    <div id="hpText">HP: 300 / 300</div>

    <div class="stage" id="gameStage">
        <!-- 關卡 1 -->
        <div class="level active" id="lvl-1">
            <div class="tv" id="tvBody">
                <div class="tv-screen">
                    <div class="screen-content" id="tvScreen"></div>
                    <svg class="crack" id="tvCrack" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M50,50 L20,20 M50,50 L80,30 M50,50 L30,80 M50,50 L70,70" stroke="black" stroke-width="4" fill="none"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 關卡 2 -->
        <div class="level" id="lvl-2">
            <div class="pc-setup" id="pcBody">
                <div class="pc-monitor" id="pcMonitor">
                    <div class="pc-screen" id="pcScreen">
                        <p>:(</p><p>豆腐渣系統崩潰</p><p>ERROR: TOFU_DIED</p>
                    </div>
                </div>
                <div class="pc-main" id="pcMain"></div>
            </div>
        </div>

        <!-- 關卡 3 -->
        <div class="level" id="lvl-3">
            <div class="claw-machine" id="clawBody">
                <div class="claw-glass" id="clawGlass">
                    <div class="doll" id="doll">🗿</div>
                </div>
                <div class="claw-bottom" id="clawBottom">
                    <div class="coin-slot"></div>
                </div>
            </div>
        </div>

        <!-- 關卡 4 -->
        <div class="level" id="lvl-4">
            <div class="building" id="buildingBody">
                <div class="floor-row"><div class="window"></div><div class="window"></div></div>
                <div class="floor-row"><div class="window"></div><div class="window"></div></div>
                <div class="floor-row"><div class="window"></div><div class="window"></div></div>
                <div class="floor-row"><div class="window"></div><div class="window"></div></div>
            </div>
        </div>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextLevel()">前進下一關 ➡️</button>

    <script>
        // 關卡設定資料庫
        const levelConfig = {
            1: { name: "📺 第 1 關：爆揍豆腐渣大頭電視", hp: 300, bodyId: "tvBody" },
            2: { name: "💻 第 2 關：爆砸當機豆腐渣電腦", hp: 500, bodyId: "pcBody" },
            3: { name: "🧸 第 3 關：搗毀夜市豆腐渣夾娃娃機", hp: 800, bodyId: "clawBody" },
            4: { name: "🏢 第 4 關：強拆終極豆腐渣摩天大樓", hp: 1500, bodyId: "buildingBody" }
        };

        let currentLevel = 1;
        let hp = levelConfig[1].hp;
        let maxHp = levelConfig[1].hp;
        
        let currentDamage = 8;
        let currentPopColor = '#00ffcc';
        let currentHitType = 'normal';

        const hpBar = document.getElementById('hpBar');
        const hpText = document.getElementById('hpText');
        const gameStage = document.getElementById('gameStage');
        const nextBtn = document.getElementById('nextBtn');
        const gameTitle = document.getElementById('gameTitle');

        function selectTool(toolType, damage, color, hitType) {
            currentDamage = damage; currentPopColor = color; currentHitType = hitType;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${toolType}`).classList.add('active');
        }

        // 核心點擊破壞邏輯
        gameStage.addEventListener('click', (e) => {
            if (hp <= 0) return;

            // 檢查是否點在目標上
            let config = levelConfig[currentLevel];
            if (!e.target.closest(`#${config.bodyId}`)) return;

            hp -= currentDamage;
            if (hp < 0) hp = 0;

            // 更新血條介面
            hpBar.style.width = (hp / maxHp) * 100 + '%';
            hpText.innerText = `HP: ${hp} / ${maxHp}`;

            // 動性晃動
            let body = document.getElementById(config.bodyId);
            body.className = body.className.replace(/\b(shake|whip-animation)\b/g, '');
            void body.offsetWidth;
            body.classList.add(currentHitType === 'whip' ? 'whip-animation' : 'shake');

            // 噴數字
            showDamagePop(e.clientX, e.clientY, currentDamage, currentPopColor);

            const ratio = hp / maxHp;

            // 通用豆腐渣化觸發 (血量低於50%)
            if (ratio <= 0.5) {
                triggerTofuVisuals(body);
                for (let i = 0; i < 6; i++) spawnTofuParticle(e.clientX, e.clientY);
            }

            // 各關卡特殊動態階段
            handleSpecialLevelStages(ratio);
        });

        // 豆腐渣外觀渲染
        function triggerTofuVisuals(body) {
            if (currentLevel === 1) body.classList.add('tofu-crumbled');
            if (currentLevel === 2) { document.getElementById('pcMonitor').classList.add('tofu-crumbled'); document.getElementById('pcMain').classList.add('tofu-crumbled'); }
            if (currentLevel === 3) { document.getElementById('clawBody').classList.add('tofu-crumbled'); document.getElementById('clawBottom').classList.add('tofu-crumbled'); }
            if (currentLevel === 4) {
                body.classList.add('tofu-crumbled');
                document.querySelectorAll('.window').forEach(w => w.style.backgroundColor = '#d1c7ad');
            }
        }

        // 處理特殊階段外觀
        function handleSpecialLevelStages(ratio) {
            if (hp === 0) {
                handleLevelClear();
                return;
            }

            if (currentLevel === 1) {
                if (ratio <= 0.6) document.getElementById('tvCrack').style.opacity = '1';
                if (ratio <= 0.2) document.getElementById('tvScreen').style.backgroundColor = '#ff4757';
            } else if (currentLevel === 2) {
                if (ratio <= 0.3) document.getElementById('pcScreen').style.backgroundColor = '#ff4757';
            } else if (currentLevel === 3) {
                if (ratio <= 0.4) { document.getElementById('clawGlass').style.backgroundColor = 'rgba(255, 71, 87, 0.2)'; document.getElementById('doll').innerText = '😱'; }
            } else if (currentLevel === 4) {
                if (ratio <= 0.3) {
                    // 大樓歪斜特效
                    document.getElementById('buildingBody').style.transform = 'skewX(-10deg)';
                }
            }
        }

        // 關卡歸零
        function handleLevelClear() {
            if (currentLevel === 1) document.getElementById('tvScreen').style.backgroundColor = '#000';
            if (currentLevel === 2) document.getElementById('pcScreen').style.backgroundColor = '#000';
            if (currentLevel === 3) { document.getElementById('clawGlass').style.backgroundColor = '#000'; document.getElementById('doll').innerText = '💀'; }
            if (currentLevel === 4) { document.getElementById('buildingBody').style.transform = 'scaleY(0.1)'; hpText.innerHTML = '<h2>🏆 全球豆腐渣工程已被你徹底剷除！英雄！</h2>'; return; }

            hpText.innerHTML = '<h2>💥 徹底報廢！豆腐渣渣飛滿天！</h2>';
            nextBtn.style.display = 'block';
        }

        // 切換到下一關
        function nextLevel() {
            currentLevel++;
            let config = levelConfig[currentLevel];
            hp = config.hp;
            maxHp = config.hp;

            gameTitle.innerText = config.name;
            hpBar.style.width = '100%';
            hpText.innerText = `HP: ${hp} / ${maxHp}`;
            nextBtn.style.display = 'none';

            // 切換 DOM 顯示
            document.querySelectorAll('.level').forEach(lvl => lvl.classList.remove('active'));
            document.getElementById(`lvl-${currentLevel}`).classList.add('active');
        }

        function spawnTofuParticle(x, y) {
            const p = document.createElement('div');
            p.classList.add('tofu-particle');
            p.style.left = (x - gameStage.offsetLeft) + 'px';
            p.style.top = (y - gameStage.offsetTop) + 'px';
            p.style.setProperty('--x', `${(Math.random() - 0.5) * 180}px`);
            p.style.setProperty('--y', `${Math.random() * 140 + 60}px`);
            gameStage.appendChild(p);
            setTimeout(() => p.remove(), 500);
        }

        function showDamagePop(x, y, dmg, color) {
            const pop = document.createElement('div');
            pop.classList.add('damage-pop');
            pop.innerText = `-${dmg}`; pop.style.color = color;
            pop.style.left = (x - gameStage.offsetLeft) + 'px';
            pop.style.top = (y - gameStage.offsetTop - 20) + 'px';
            gameStage.appendChild(pop);
            setTimeout(() => pop.remove(), 350);
        }
    </script>
</body>
</html>
